<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mertule Mariyam Exam Prep</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        /* 2026 Modern Design (Glassmorphism) */
        body {
            margin: 0; font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(45deg, #0f0c29, #302b63, #24243e);
            color: white; height: 100vh; display: flex; justify-content: center; align-items: center; text-align: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px);
            border-radius: 30px; padding: 25px; border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5); width: 85%; max-width: 500px;
            max-height: 90vh; overflow-y: auto;
        }
        .hidden { display: none !important; }
        h1 { font-size: 1.6rem; color: #00d2ff; }
        .creator { font-weight: bold; color: #ffd700; font-size: 1.1rem; margin-top: 10px; }
        .cap-icon { font-size: 70px; margin-bottom: 5px; }
        
        button {
            background: linear-gradient(to right, #00d2ff, #3a7bd5); color: white;
            border: none; padding: 12px 25px; border-radius: 50px; font-size: 1.1rem;
            cursor: pointer; margin: 10px; transition: 0.3s; width: 80%;
        }
        button:hover { transform: scale(1.05); box-shadow: 0 0 20px #00d2ff; }
        input, textarea {
            width: 80%; padding: 12px; margin: 10px; border-radius: 10px; border: none; outline: none;
            background: rgba(255, 255, 255, 0.2); color: white;
        }
        #timer { font-size: 1.5rem; color: #ff4b2b; font-weight: bold; margin-bottom: 15px; }
        .q-text { text-align: left; font-size: 1.1rem; margin-bottom: 15px; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 10px; }
        .status-msg { color: #ffd700; font-size: 0.9rem; margin: 5px; }
        #install-box { background: #ffd700; color: #000; font-weight: bold; margin-bottom: 15px; display: none; }
    </style>
</head>
<body>

    <div id="splash" class="container">
        <div class="cap-icon">🎓</div>
        <h1>እንኳን ወደ መርጡለ ማሪያም 2ኛ ደረጃ ትምህርት ቤት የተማሪዎች የፈተና መለማመጃ ሲስተም በደህና መጣችሁ!</h1>
        <p class="creator">አዘጋጅ፦ በረከት ቀናው</p>
    </div>

    <div id="main-menu" class="container hidden">
        <button id="install-box" onclick="installApp()">አፑን ስልክ ላይ ጫን (Install)</button>
        <div style="text-align: right; margin-bottom: 10px;">
            <select id="lang" style="padding: 5px; border-radius: 5px;">
                <option>አማርኛ</option>
                <option>English</option>
            </select>
        </div>
        <h1>ምርጫዎን ያሳውቁ</h1>
        <button onclick="showRoleSelection()">Start / ጀምር</button>
    </div>

    <div id="role-page" class="container hidden">
        <h1>ማን ነዎት?</h1>
        <button onclick="studentFlow()">ተማሪ (Student)</button>
        <button onclick="adminFlow()">አድሚን (Admin)</button>
        <br><button style="background: grey; width: 40%;" onclick="backToMenu()">ወደ ኋላ</button>
    </div>

    <div id="admin-login" class="container hidden">
        <h1>Admin Login</h1>
        <input type="password" id="admin-pass" placeholder="Password ያስገቡ...">
        <button onclick="checkAdminPass()">ግባ</button>
        <button style="background: grey; width: 40%;" onclick="backToRole()">ወደ ኋላ</button>
    </div>

    <div id="category-page" class="container hidden">
        <h1 id="category-title">ዘርፍ ይምረጡ</h1>
        <button onclick="showSubjects('Social')">Social Science</button>
        <button onclick="showSubjects('Natural')">Natural Science</button>
        <br><button style="background: grey; width: 40%;" onclick="backToRole()">ወደ ኋላ</button>
    </div>

    <div id="subject-page" class="container hidden">
        <h1 id="subject-title">ትምህርት ይምረጡ</h1>
        <div id="subject-list"></div>
        <div id="admin-upload-area" class="hidden">
            <textarea id="question-input" rows="5" placeholder="ጥያቄዎችን እዚህ ፔስት ያድርጉ..."></textarea>
            <div id="ocr-status" class="status-msg"></div>
            <button onclick="saveQuestions()" style="background: #28a745;">ጥያቄዎቹን ጫን</button>
            
            <input type="file" id="camera-file" accept="image/*" capture="environment" class="hidden" onchange="handleOCR(this)">
            <button onclick="document.getElementById('camera-file').click()" style="background: #e67e22;">📷 በካሜራ አንሳ</button>
        </div>
        <button style="background: grey; width: 40%;" onclick="backToCategory()">ወደ ኋላ</button>
    </div>

    <div id="exam-page" class="container hidden">
        <div id="timer">60:00</div>
        <div id="current-question-box" class="q-text"></div>
        <input type="text" id="student-answer" placeholder="መልስዎን እዚህ ይጻፉ (A, B, C, D)">
        <button onclick="nextQuestion()">ቀጣይ (Next)</button>
        <button id="submit-btn" onclick="finishExam()" class="hidden" style="background: #27ae60;">ጨርስ (Submit)</button>
    </div>

    <script>
        // --- Offline & Install Support ---
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('install-box').style.display = 'block';
        });

        function installApp() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then(() => {
                    document.getElementById('install-box').style.display = 'none';
                });
            }
        }

        // --- Original App Logic ---
        let isAdmin = false;
        let selectedSubject = "";
        let currentQuestions = [];
        let currentIndex = 0;
        let timerSeconds = 3600;
        let score = 0;

        const screens = ['splash', 'main-menu', 'role-page', 'admin-login', 'category-page', 'subject-page', 'exam-page'];

        function showScreen(id) {
            screens.forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        setTimeout(() => showScreen('main-menu'), 5000);

        function showRoleSelection() { showScreen('role-page'); }
        function studentFlow() { isAdmin = false; showScreen('category-page'); }
        function adminFlow() { showScreen('admin-login'); }

        function checkAdminPass() {
            if(document.getElementById('admin-pass').value === "Mertule Mariyam@2026") {
                isAdmin = true;
                showScreen('category-page');
            } else { alert("የተሳሳተ ፓስወርድ ነው!"); }
        }

        function showSubjects(type) {
            showScreen('subject-page');
            const list = document.getElementById('subject-list');
            list.innerHTML = "";
            const subs = type === 'Social' ? ['Geography', 'History', 'Economics'] : ['Biology', 'Physics', 'Chemistry'];
            
            subs.forEach(s => {
                const btn = document.createElement('button');
                btn.innerText = s;
                btn.onclick = () => selectSubject(s);
                list.appendChild(btn);
            });
        }

        function selectSubject(s) {
            selectedSubject = s;
            if(isAdmin) {
                document.getElementById('subject-list').classList.add('hidden');
                document.getElementById('admin-upload-area').classList.remove('hidden');
                document.getElementById('subject-title').innerText = s + " ጥያቄ መጫኛ";
            } else {
                startExam(s);
            }
        }

        function handleOCR(input) {
            const file = input.files[0];
            if (!file) return;
            document.getElementById('ocr-status').innerText = "ፎቶው ወደ ጽሑፍ እየተቀየረ ነው... እባክዎ ይጠብቁ";
            
            Tesseract.recognize(file, 'eng', { logger: m => console.log(m) }).then(({ data: { text } }) => {
                document.getElementById('question-input').value = text;
                document.getElementById('ocr-status').innerText = "በስኬት ተቀይሯል!";
            }).catch(err => {
                document.getElementById('ocr-status').innerText = "ስህተት ተፈጥሯል፣ እባክዎ እንደገና ይሞክሩ።";
            });
        }

        function saveQuestions() {
            const input = document.getElementById('question-input').value;
            if(!input) return alert("እባክዎ ጥያቄ ያስገቡ!");
            localStorage.setItem('exam_' + selectedSubject, input);
            alert(selectedSubject + " ጥያቄዎች በስኬት ተጭነዋል!");
            backToCategory();
        }

        function startExam(s) {
            const data = localStorage.getItem('exam_' + s);
            if(!data) return alert("ለዚህ ትምህርት ጥያቄ ገና አልተጫነም!");
            
            currentQuestions = data.split('\n').filter(q => q.trim() !== "");
            currentIndex = 0;
            score = 0;
            showScreen('exam-page');
            updateQuestion();
            startTimer();
        }

        function updateQuestion() {
            document.getElementById('current-question-box').innerText = currentQuestions[currentIndex];
            document.getElementById('student-answer').value = "";
            if(currentIndex === currentQuestions.length - 1) {
                document.getElementById('submit-btn').classList.remove('hidden');
            }
        }

        function nextQuestion() {
            if(!document.getElementById('student-answer').value) return alert("መልስ ሳይሰጡ ማለፍ አይቻልም!");
            score++; 
            if(currentIndex < currentQuestions.length - 1) {
                currentIndex++;
                updateQuestion();
            }
        }

        function startTimer() {
            const t = setInterval(() => {
                timerSeconds--;
                let min = Math.floor(timerSeconds / 60);
                let sec = timerSeconds % 60;
                document.getElementById('timer').innerText = `${min}:${sec < 10 ? '0'+sec : sec}`;
                if(timerSeconds <= 0) {
                    clearInterval(t);
                    finishExam();
                }
            }, 1000);
        }

        function finishExam() {
            alert("ፈተናውን ጨርሰዋል። ውጤትዎ: " + currentIndex + "/" + currentQuestions.length);
            location.reload();
        }

        function backToMenu() { showScreen('main-menu'); }
        function backToRole() { showScreen('role-page'); }
        function backToCategory() { 
            showScreen('category-page'); 
            document.getElementById('subject-list').classList.remove('hidden');
            document.getElementById('admin-upload-area').classList.add('hidden');
        }
    </script>
</body>
</html>
