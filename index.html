<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mertule Mariyam School App</title>
    
    <link rel="manifest" href="data:application/manifest+json;base64,ewogICJuYW1lIjogIk1lcnR1bGUgTWFyaXlhbSBTY2hvb2wgQXBwIiwKICAic2hvcnRfbmFtZSI6ICJNTS1TY2hvb2wiLAogICJzdGFydF91cmwiOiAiLi8iLAogICJkaXNwbGF5IjogInN0YW5kYWxvbmUiLAogICJiYWNrZ3JvdW5kX2NvbG9yIjogIiMwZjBjMjkiLAogICJ0aGVtZV9jb2xvciI6ICIjMzAybjYzIiwKICAiaWNvbnMiOiBbCiAgICB7CiAgICAgICJzcmMiOiAiaHR0cHM6Ly9jZG4taWNvbnMtcG5nLmZsaXRpY29uLmNvbS81MTIvMjk5Ny8yOTk3OTExLnBuZyIsCiAgICAgICJzaXplcyI6ICI1MTJ4NTEyIiwKICAgICAgInR5cGUiOiAiaW1hZ2UvcG5nIgogICAgfQogIF0KfQ==">
    
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

    <style>
        :root { --primary: #00d2ff; --secondary: #3a7bd5; --accent: #ffd700; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #0f0c29; color: white; overflow-x: hidden; }
        .screen { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .hidden { display: none !important; }
        
        /* የሚያምር አሸበረቀ ቀለም */
        .shining-text {
            background: linear-gradient(to right, #fff, #ffd700, #fff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
            font-weight: bold;
        }
        @keyframes shine { to { background-position: 200% center; } }

        .card { background: rgba(255,255,255,0.1); backdrop-filter: blur(15px); border-radius: 20px; padding: 25px; width: 90%; max-width: 450px; border: 1px solid rgba(255,255,255,0.2); text-align: center; }
        
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: none; font-size: 1rem; }
        input, select { background: rgba(255,255,255,0.2); color: white; }
        button { background: linear-gradient(to right, var(--primary), var(--secondary)); color: white; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { transform: scale(1.05); }
        
        .back-btn { background: #636e72; width: auto; padding: 5px 15px; font-size: 0.8rem; position: absolute; top: 10px; left: 10px; }
        .nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        .subject-btn { background: rgba(0, 210, 255, 0.2); border: 1px solid var(--primary); height: 80px; display: flex; align-items: center; justify-content: center; }
        
        #announcement-bar { background: var(--accent); color: black; width: 100%; padding: 5px; position: fixed; top: 0; font-weight: bold; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div id="announcement-bar" class="hidden">📢 <span id="ann-text"></span></div>

    <div id="splash" class="screen">
        <div style="font-size: 60px;">🎓</div>
        <h1 class="shining-text">እንኳን ወደ መርጡለ ማሪያም School App በደህና መጣችሁ!</h1>
        <h2 class="shining-text" style="font-size: 1.2rem;">አዘጋጅ፦ በረከት ቀናው</h2>
    </div>

    <div id="login-screen" class="screen hidden">
        <div class="card">
            <h2>ይመዝገቡ</h2>
            <input type="text" id="fname" placeholder="ስም">
            <input type="text" id="lname" placeholder="የአባት ስም">
            <input type="number" id="phone" placeholder="ስልክ (09... የቴሌ ብቻ)">
            <input type="number" id="age" placeholder="እድሜ">
            <select id="gender"><option value="">ፆታ</option><option>ወንድ</option><option>ሴት</option></select>
            <select id="role" onchange="handleRoleChange()">
                <option value="student">ተማሪ</option>
                <option value="teacher">መምህር</option>
                <option value="admin">ርዕሰ መምህር / አስተዳደር</option>
            </select>
            <div id="code-area" class="hidden">
                <input type="password" id="access-code" placeholder="የመግቢያ ኮድ ያስገቡ">
            </div>
            <button onclick="performLogin()">ይግቡ</button>
        </div>
    </div>

    <div id="grade-screen" class="screen hidden">
        <button class="back-btn" onclick="showScreen('login-screen')">Logout</button>
        <h2 class="shining-text">የክፍል ደረጃ ይምረጡ</h2>
        <div class="nav-grid">
            <button class="subject-btn" onclick="showSubjects('9')">9ኛ ክፍል (2018)</button>
            <button class="subject-btn" onclick="showSubjects('10')">10ኛ ክፍል (2018)</button>
            <button class="subject-btn" onclick="showSubjects('11-Natural')">11 Natural</button>
            <button class="subject-btn" onclick="showSubjects('11-Social')">11 Social</button>
            <button class="subject-btn" onclick="showSubjects('12-Natural')">12 Natural</button>
            <button class="subject-btn" onclick="showSubjects('12-Social')">12 Social</button>
        </div>
        <div id="admin-tools" class="hidden" style="margin-top: 20px; width: 100%;">
            <hr>
            <h3>የአስተዳደር ክፍል</h3>
            <textarea id="ann-input" placeholder="ለሁሉም የሚተላለፍ ማስታወቂያ..."></textarea>
            <button onclick="postAnnouncement()" style="background: var(--accent); color: black;">ማስታወቂያ አውጣ</button>
        </div>
    </div>

    <div id="subject-screen" class="screen hidden">
        <button class="back-btn" onclick="showScreen('grade-screen')">Back</button>
        <h2 id="current-grade-title">ትምህርቶች</h2>
        <div id="subject-list" class="nav-grid"></div>
    </div>

    <div id="content-screen" class="screen hidden">
        <button class="back-btn" onclick="showScreen('subject-screen')">Back</button>
        <h2 id="current-subject-title">Subject Name</h2>
        <div class="nav-grid">
            <button onclick="openTab('pdf')">📄 PDF</button>
            <button onclick="openTab('video')">🎬 Video</button>
            <button onclick="openTab('image')">🖼️ Image</button>
            <button onclick="openTab('chat')">💬 Chat/Text</button>
        </div>
        
        <div id="upload-area" class="hidden" style="margin-top: 20px; border: 1px dashed white; padding: 10px;">
            <h4>ፋይል መጫኛ (መምህራን/አድሚን ብቻ)</h4>
            <input type="file" id="file-upload" multiple>
            <button onclick="alert('ፋይሉ ተጭኗል!')">Upload File</button>
        </div>

        <div id="display-area" style="margin-top: 20px; width: 100%; min-height: 200px; background: rgba(0,0,0,0.5);">
            <p>የተመረጠ ፋይል የለም።</p>
        </div>
    </div>

    <script>
        // --- 1. INITIALIZATION & SPLASH ---
        let currentUser = null;
        setTimeout(() => {
            if(localStorage.getItem('mm_user')) {
                currentUser = JSON.parse(localStorage.getItem('mm_user'));
                showScreen('grade-screen');
                checkAdminFeatures();
            } else {
                showScreen('login-screen');
            }
        }, 5000);

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        // --- 2. LOGIN LOGIC ---
        function handleRoleChange() {
            const role = document.getElementById('role').value;
            const codeArea = document.getElementById('code-area');
            if(role === 'student') codeArea.classList.add('hidden');
            else codeArea.classList.remove('hidden');
        }

        function performLogin() {
            const role = document.getElementById('role').value;
            const code = document.getElementById('access-code').value;
            const phone = document.getElementById('phone').value;

            if(!phone.startsWith('09') && !phone.startsWith('07')) return alert("እባክዎ ትክክለኛ የቴሌ/ሳፋሪኮም ስልክ ያስገቡ");

            if(role === 'teacher' && code !== '121619') return alert("የመምህር መለያ ኮድ ተሳስቷል!");
            if(role === 'admin' && code !== '12161921') return alert("የአስተዳደር መለያ ኮድ ተሳስቷል!");

            currentUser = {
                name: document.getElementById('fname').value,
                role: role,
                phone: phone
            };
            localStorage.setItem('mm_user', JSON.stringify(currentUser));
            showScreen('grade-screen');
            checkAdminFeatures();
        }

        function checkAdminFeatures() {
            if(currentUser.role === 'admin' || currentUser.role === 'teacher') {
                document.getElementById('upload-area').classList.remove('hidden');
                if(currentUser.role === 'admin') document.getElementById('admin-tools').classList.remove('hidden');
            }
        }

        // --- 3. NAVIGATION & CONTENT ---
        function showSubjects(grade) {
            showScreen('subject-screen');
            const list = document.getElementById('subject-list');
            list.innerHTML = "";
            const subs = ["English", "Maths", "Biology", "Physics", "Chemistry", "Civics", "Amharic"];
            subs.forEach(s => {
                const btn = document.createElement('button');
                btn.className = "subject-btn";
                btn.innerText = s;
                btn.onclick = () => {
                    document.getElementById('current-subject-title').innerText = s;
                    showScreen('content-screen');
                };
                list.appendChild(btn);
            });
        }

        function postAnnouncement() {
            const txt = document.getElementById('ann-input').value;
            localStorage.setItem('mm_announcement', txt);
            displayAnn();
        }

        function displayAnn() {
            const ann = localStorage.getItem('mm_announcement');
            if(ann) {
                document.getElementById('announcement-bar').classList.remove('hidden');
                document.getElementById('ann-text').innerText = ann;
            }
        }
        displayAnn();

        // --- 4. OFFLINE & PWA ---
        if ('serviceWorker' in navigator) {
            const swCode = `
                self.addEventListener('install', e => e.waitUntil(caches.open('mm-v1').then(c => c.addAll(['./']))));
                self.addEventListener('fetch', e => e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))));
            `;
            const blob = new Blob([swCode], { type: 'text/javascript' });
            navigator.serviceWorker.register(URL.createObjectURL(blob));
        }
    </script>
</body>
</html>
