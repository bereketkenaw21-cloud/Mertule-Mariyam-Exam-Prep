<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mertule Mariyam Exam Prep</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        /* 2026 Modern Design (Glassmorphism) */
        body {
            margin: 0; font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(45deg, #0f0c29, #302b63, #24243e);
            color: white; height: 100vh; display: flex; justify-content: center; align-items: center; text-align: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px);
            border-radius: 30px; padding: 25px; border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5); width: 85%; max-width: 500px;
            max-height: 90vh; overflow-y: auto;
        }
        .hidden { display: none !important; }
        h1 { font-size: 1.4rem; color: #00d2ff; line-height: 1.5; }
        .creator { font-weight: bold; color: #ffd700; font-size: 1.1rem; margin-top: 15px; }
        .cap-icon { font-size: 70px; margin-bottom: 10px; }
        
        button {
            background: linear-gradient(to right, #00d2ff, #3a7bd5); color: white;
            border: none; padding: 12px 20px; border-radius: 50px; font-size: 1rem;
            cursor: pointer; margin: 8px; transition: 0.3s; width: 85%;
        }
        button:hover { transform: scale(1.02); box-shadow: 0 0 15px #00d2ff; }
        
        .options-container { display: flex; flex-direction: column; align-items: center; width: 100%; }
        .option-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 15px; padding: 12px; margin: 6px 0;
            width: 90%; text-align: left; font-size: 1rem; color: white;
            transition: 0.3s; cursor: pointer;
        }
        .option-btn.selected {
            background: #00d2ff; color: #000; font-weight: bold; border-color: #fff;
        }

        #timer { font-size: 2rem; color: #ff4b2b; font-weight: bold; margin-bottom: 10px; text-shadow: 0 0 10px rgba(255,75,43,0.4); }
        .q-info { font-size: 0.9rem; color: #ffd700; margin-bottom: 5px; }
        .q-text { text-align: left; font-size: 1.1rem; margin-bottom: 15px; padding: 15px; background: rgba(0,0,0,0.3); border-radius: 15px; min-height: 50px; }
        .back-btn { background: #636e72 !important; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="splash" class="container">
        <div class="cap-icon">🎓</div>
        <h1>እንኳን ወደ መርጡለ ማሪያም 2ኛ ደረጃ ትምህርት ቤት የተማሪዎች የፈተና መለማመጃ ሲስተም በደህና መጣችሁ!</h1>
        <p class="creator">አዘጋጅ፦ በረከት ቀናው</p>
    </div>

    <div id="main-menu" class="container hidden">
        <h1>ምርጫዎን ያሳውቁ</h1>
        <button onclick="showScreen('role-page')">Start / ጀምር</button>
        <button onclick="showScanPage()" style="background: #9b59b6;">ጥያቄ በ QR Scan ተቀበል</button>
    </div>

    <div id="role-page" class="container hidden">
        <h1>ማን ነዎት?</h1>
        <button onclick="studentFlow()">ተማሪ (Student)</button>
        <button onclick="adminLoginFlow()">አድሚን (Admin)</button>
        <button class="back-btn" onclick="showScreen('main-menu')">ወደ ኋላ</button>
    </div>

    <div id="stream-page" class="container hidden">
        <h1 id="stream-header">ዘርፍ ይምረጡ</h1>
        <button onclick="selectStream('Natural')">Natural Science</button>
        <button onclick="selectStream('Social')">Social Science</button>
        <button class="back-btn" onclick="showScreen('role-page')">ወደ ኋላ</button>
    </div>

    <div id="subject-page" class="container hidden">
        <h1 id="subject-header">ትምህርት ይምረጡ</h1>
        <div id="subject-list"></div>
        <button class="back-btn" onclick="showScreen('stream-page')">ወደ ኋላ</button>
    </div>

    <div id="exam-page" class="container hidden">
        <div id="timer">60:00</div>
        <div id="q-info-box" class="q-info"></div>
        <div id="current-question-box" class="q-text"></div>
        
        <div id="options-area" class="options-container">
            <div class="option-btn" id="optA" onclick="selectOption('A')"></div>
            <div class="option-btn" id="optB" onclick="selectOption('B')"></div>
            <div class="option-btn" id="optC" onclick="selectOption('C')"></div>
            <div class="option-btn" id="optD" onclick="selectOption('D')"></div>
        </div>

        <div style="display: flex; justify-content: space-around; margin-top: 15px;">
            <button id="prev-btn" onclick="goBack()" style="width: 45%; background: #e67e22;">Back</button>
            <button id="next-btn" onclick="nextQuestion()" style="width: 45%;">Next</button>
        </div>
        <button id="submit-btn" onclick="finishExam()" class="hidden" style="background: #27ae60; margin-top: 15px;">ጨርስ (Submit)</button>
    </div>

    <div id="result-page" class="container hidden">
        <h1>ውጤትዎ</h1>
        <h2 id="final-score-display" style="font-size: 2.5rem; color: #ffd700;"></h2>
        <button onclick="location.reload()">እንደገና ጀምር</button>
    </div>

    <script>
        let currentQuestions = [], currentIndex = 0, selectedAnswer = null, score = 0;
        let timeLeft = 3600; 
        let timerInterval;
        let isAdminMode = false;

        // መጀመሪያ Splash Screen ለ 4 ሰከንድ ይታያል
        setTimeout(() => showScreen('main-menu'), 4000);

        function showScreen(id) {
            document.querySelectorAll('.container').forEach(c => c.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function studentFlow() {
            isAdminMode = false;
            showScreen('stream-page');
        }

        function adminLoginFlow() {
            let pass = prompt("Admin Password ያስገቡ:");
            if(pass === "Mertule Mariyam@2026") {
                isAdminMode = true;
                showScreen('stream-page');
            } else {
                alert("የተሳሳተ ፓስወርድ ነው!");
            }
        }

        function selectStream(stream) {
            showScreen('subject-page');
            const list = document.getElementById('subject-list');
            list.innerHTML = "";
            document.getElementById('subject-header').innerText = stream + " ዘርፍ ትምህርቶች";
            
            // Common Subjects (ለአድሚንም ለተማሪም በተመሳሳይ ቅደም ተከተል)
            let subjects = ["English", "Maths"];
            if(stream === "Natural") {
                subjects.push("Physics", "Chemistry", "Biology");
            } else {
                subjects.push("Geography", "History", "Economics");
            }

            subjects.forEach(sub => {
                let btn = document.createElement('button');
                btn.innerText = sub;
                btn.onclick = () => {
                    if(isAdminMode) {
                        alert(sub + " ጥያቄዎችን ለማስተዳደር (በቅርቡ ይጠናቀቃል)");
                    } else {
                        startExam(sub);
                    }
                };
                list.appendChild(btn);
            });
        }

        function startExam(subject) {
            // በምሳሌነት የቀረቡ ጥያቄዎች (እዚህ ጋር ጥያቄዎችን መጨመር ትችላለህ)
            currentQuestions = [
                { q: subject + " ጥያቄ 1: የዚህ ትምህርት ዋና ዓላማ ምንድነው?", a: "መረዳት", b: "መሸምደድ", c: "ማለፍ", d: "ማወቅ", correct: "A" },
                { q: subject + " ጥያቄ 2: ፈተናውን ለመጨረስ ምን ያህል ጊዜ ይፈጃል?", a: "30 ደቂቃ", b: "1 ሰዓት", c: "2 ሰዓት", d: "10 ደቂቃ", correct: "B" }
            ];
            currentIndex = 0;
            score = 0;
            timeLeft = 3600; // ለፈተናው 1 ሰዓት ይሰጣል
            showScreen('exam-page');
            loadQuestion();
            startTimer(); 
        }

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                let mins = Math.floor(timeLeft / 60);
                let secs = timeLeft % 60;
                document.getElementById('timer').innerText = 
                    (mins < 10 ? "0" : "") + mins + ":" + (secs < 10 ? "0" : "") + secs;
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    finishExam(); // ሰዓቱ ሲያልቅ በራሱ ይዘጋል
                }
            }, 1000);
        }

        function loadQuestion() {
            let q = currentQuestions[currentIndex];
            document.getElementById('q-info-box').innerText = "Question " + (currentIndex + 1) + " of " + currentQuestions.length;
            document.getElementById('current-question-box').innerText = q.q;
            
            document.getElementById('optA').innerText = "A) " + q.a;
            document.getElementById('optB').innerText = "B) " + q.b;
            document.getElementById('optC').innerText = "C) " + q.c;
            document.getElementById('optD').innerText = "D) " + q.d;

            resetOptions();
            selectedAnswer = null;

            if(currentIndex === currentQuestions.length - 1) {
                document.getElementById('next-btn').classList.add('hidden');
                document.getElementById('submit-btn').classList.remove('hidden');
            } else {
                document.getElementById('next-btn').classList.remove('hidden');
                document.getElementById('submit-btn').classList.add('hidden');
            }
        }

        function selectOption(choice) {
            resetOptions();
            selectedAnswer = choice;
            document.getElementById('opt' + choice).classList.add('selected');
        }

        function resetOptions() {
            document.querySelectorAll('.option-btn').forEach(btn => btn.classList.remove('selected'));
        }

        function nextQuestion() {
            if(!selectedAnswer) return alert("እባክዎ መልስ ይምረጡ!");
            if(selectedAnswer === currentQuestions[currentIndex].correct) score++;
            currentIndex++;
            loadQuestion();
        }

        function finishExam() {
            if(selectedAnswer && selectedAnswer === currentQuestions[currentIndex].correct) score++;
            clearInterval(timerInterval);
            showScreen('result-page');
            document.getElementById('final-score-display').innerText = score + " / " + currentQuestions.length;
        }

        function goBack() {
            if(currentIndex > 0) {
                currentIndex--;
                loadQuestion();
            }
        }

        function showScanPage() { alert("QR Scanning system በቅርቡ ይከፈታል!"); }
    </script>
</body>
</html>
