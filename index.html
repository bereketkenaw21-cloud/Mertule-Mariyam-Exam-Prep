<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mertule Mariyam Exam Prep</title>
    <style>
        body {
            margin: 0; font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(45deg, #0f0c29, #302b63, #24243e);
            color: white; height: 100vh; display: flex; justify-content: center; align-items: center; text-align: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(25px);
            border-radius: 30px; padding: 25px; border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5); width: 88%; max-width: 500px;
            max-height: 92vh; overflow-y: auto;
        }
        .hidden { display: none !important; }
        
        .q-card {
            background: rgba(0, 0, 0, 0.3); border-radius: 20px;
            padding: 20px; font-size: 1.3rem; text-align: left;
            margin-bottom: 25px; border-left: 5px solid #00d2ff;
        }

        /* የመምረጫ ሳጥኖች - መጻፊያ የለውም */
        .options-list { display: flex; flex-direction: column; gap: 15px; width: 100%; }
        .option-item {
            display: flex; align-items: center; cursor: pointer;
            padding: 15px; border-radius: 15px; background: rgba(255, 255, 255, 0.05);
            transition: 0.3s; border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        /* ሲመረጥ የሚሆን ቀለም */
        .option-item.selected {
            background: rgba(0, 210, 255, 0.2);
            border: 1px solid #00d2ff;
        }

        .circle-label {
            width: 40px; height: 40px; border-radius: 50%;
            border: 2px solid #00d2ff; display: flex;
            justify-content: center; align-items: center;
            font-weight: bold; margin-right: 15px; flex-shrink: 0;
        }
        
        .option-item.selected .circle-label {
            background: #00d2ff; color: #000;
        }

        .option-text { font-size: 1.1rem; text-align: left; }

        button {
            background: linear-gradient(to right, #00d2ff, #3a7bd5); color: white;
            border: none; padding: 14px; border-radius: 50px; font-size: 1.1rem;
            cursor: pointer; width: 80%; margin-top: 20px;
        }
        .nav-btns { display: flex; justify-content: space-between; gap: 10px; margin-top: 20px; }
        .nav-btns button { width: 45%; margin-top: 0; }
        
        textarea {
            width: 90%; padding: 15px; border-radius: 15px; border: none;
            background: rgba(255, 255, 255, 0.2); color: white; margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div id="splash" class="container">
        <h1 style="color: #00d2ff;">🎓 መርጡለ ማሪያም</h1>
        <p>የተማሪዎች ፈተና መለማመጃ</p>
        <button onclick="showScreen('main-menu')">ጀምር</button>
    </div>

    <div id="main-menu" class="container hidden">
        <h1>ዋና ማውጫ</h1>
        <button onclick="showSubjects()">ተማሪ (Student)</button>
        <button onclick="showAdminLogin()" style="background: #9b59b6;">አድሚን (Admin)</button>
    </div>

    <div id="admin-area" class="container hidden">
        <h3>ጥያቄዎችን ያስገቡ</h3>
        <p style="font-size: 0.7rem; color: #ffd700;">ጥያቄ | A | B | C | D | መልስ</p>
        <textarea id="q-input" rows="8" placeholder="ለምሳሌ፡ 2+2? | 3 | 4 | 5 | 6 | 4"></textarea>
        <button onclick="saveQuestions()" style="background: #27ae60;">አስቀምጥ</button>
        <button onclick="showScreen('main-menu')" style="background: grey;">ተመለስ</button>
    </div>

    <div id="subject-page" class="container hidden">
        <h2>ትምህርት ይምረጡ</h2>
        <button onclick="startExam('Maths')">Mathematics</button>
        <button onclick="startExam('Physics')">Physics</button>
        <button onclick="showScreen('main-menu')" style="background: grey;">ተመለስ</button>
    </div>

    <div id="exam-page" class="container hidden">
        <div id="q-text" class="q-card"></div>
        <div id="options-box" class="options-list"></div>
        
        <div class="nav-btns">
            <button onclick="goBack()" style="background: #e67e22;">Back</button>
            <button onclick="goNext()">Next</button>
        </div>
    </div>

    <div id="result-page" class="container hidden">
        <h1>ውጤት</h1>
        <h2 id="final-score" style="font-size: 3.5rem; color: #00d2ff;"></h2>
        <button onclick="location.reload()">እንደገና ጀምር</button>
    </div>

    <script>
        let isAdmin=false, currentQs=[], currentIndex=0, studentAns=[];

        function showScreen(id) {
            document.querySelectorAll('.container').forEach(c => c.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function showAdminLogin() {
            let p = prompt("Password ያስገቡ:");
            if(p === "Mertule Mariyam@2026") { isAdmin=true; showScreen('admin-area'); }
        }

        function showSubjects() { showScreen('subject-page'); }

        function saveQuestions() {
            localStorage.setItem('saved_exams', document.getElementById('q-input').value);
            alert("ጥያቄዎቹ ተቀምጠዋል!");
        }

        function startExam() {
            const data = localStorage.getItem('saved_exams');
            if(!data) return alert("ጥያቄ አልተጫነም!");
            currentQs = data.split('\n').filter(l => l.includes('|'));
            currentIndex = 0; studentAns = new Array(currentQs.length).fill(null);
            showScreen('exam-page'); updateQ();
        }

        function updateQ() {
            const parts = currentQs[currentIndex].split('|');
            document.getElementById('q-text').innerText = (currentIndex + 1) + ". " + parts[0].trim();
            
            const box = document.getElementById('options-box');
            box.innerHTML = "";
            const labels = ['A', 'B', 'C', 'D'];

            for(let i=1; i<=4; i++) {
                const choiceValue = parts[i] ? parts[i].trim() : "";
                if(!choiceValue) continue;

                const item = document.createElement('div');
                item.className = 'option-item';
                // ተማሪው ቀድሞ የመረጠው ከሆነ ምልክት ያደርጋል
                if(studentAns[currentIndex] === choiceValue) item.classList.add('selected');

                item.innerHTML = `
                    <div class="circle-label">${labels[i-1]}</div>
                    <div class="option-text">${choiceValue}</div>
                `;
                
                // እዚህ ጋር ነው ክሊክ ሲያደርግ ብቻ የሚመርጠው
                item.onclick = () => {
                    studentAns[currentIndex] = choiceValue;
                    updateQ(); // ቀለሙን እንዲቀይር ድጋሚ ያድሳል
                };
                box.appendChild(item);
            }
        }

        function goNext() {
            if(studentAns[currentIndex] === null) return alert("እባክዎ አንድ ምርጫ ይንኩ!");
            if(currentIndex < currentQs.length - 1) { currentIndex++; updateQ(); }
            else finish();
        }

        function goBack() { if(currentIndex > 0) { currentIndex--; updateQ(); } }

        function finish() {
            showScreen('result-page');
            let score = 0;
            currentQs.forEach((q, i) => {
                const correct = q.split('|')[5].trim();
                if(studentAns[i] === correct) score++;
            });
            document.getElementById('final-score').innerText = score + " / " + currentQs.length;
        }
    </script>
</body>
</html>
