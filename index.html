<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mertule Mariyam Exam Prep</title>
    
    <link rel="manifest" href="data:application/manifest+json;base64,ewogICJkZWZhdWx0X2xvY2FsZSI6ICJhbSIsCiAgIm5hbWUiOiAiTWVydHVsZSBNYXJpeWFtIEV4YW0iLAogICJzaG9ydF9uYW1lIjogIk1NIEV4YW0iLAogICJzdGFydF91cmwiOiAiLi8iLAogICJkaXNwbGF5IjogInN0YW5kYWxvbmUiLAogICJiYWNrZ3JvdW5kX2NvbG9yIjogIiMwZjBjMjkiLAogICJ0aGVtZV9jb2xvciI6ICIjMzAybjYzIiwKICAiaWNvbnMiOiBbCiAgICB7CiAgICAgICJzcmMiOiAiaHR0cHM6Ly9jZG4taWNvbnMtcG5nLmZsaXRpY29uLmNvbS81MTIvMjk5Ny8yOTk3OTExLnBuZyIsCiAgICAgICJzaXplcyI6ICI1MTJ4NTEyIiwKICAgICAgInR5cGUiOiAiaW1hZ2UvcG5nIgogICAgfQogIF0KfQ==">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="theme-color" content="#302b63">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    
    <style>
        body {
            margin: 0; font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(45deg, #0f0c29, #302b63, #24243e);
            color: white; height: 100vh; display: flex; justify-content: center; align-items: center; text-align: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px);
            border-radius: 30px; padding: 25px; border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5); width: 85%; max-width: 500px;
            max-height: 90vh; overflow-y: auto;
        }
        .hidden { display: none !important; }
        button {
            background: linear-gradient(to right, #00d2ff, #3a7bd5); color: white;
            border: none; padding: 12px 20px; border-radius: 50px; font-size: 1rem;
            cursor: pointer; margin: 8px; width: 85%; transition: 0.3s;
        }
        input, select, textarea {
            width: 90%; padding: 10px; margin: 5px 0; border-radius: 10px; border: none; background: rgba(255,255,255,0.2); color: white;
        }
        .smart-paste-box { border: 1px dashed #00d2ff; height: 80px; }
        #qr-reader { width: 100%; border-radius: 15px; overflow: hidden; }
        #qrcode-output { background: white; padding: 15px; display: inline-block; border-radius: 10px; margin: 10px; }
        
        /* Install Button Style */
        #install-btn {
            position: fixed; top: 10px; right: 10px; background: #27ae60; 
            padding: 8px 15px; font-size: 0.8rem; z-index: 2000; width: auto;
        }
    </style>
</head>
<body>

    <button id="install-btn" class="hidden">Install App</button>

    <div id="splash" class="container">
        <div style="font-size:70px">🎓</div>
        <h1 style="font-size: 1.3rem; line-height: 1.6; color: #00d2ff;">
            እንኳን ወደ መርጡለ ማሪያም 2ኛ ደረጃ ትምህርት ቤት የተማሪዎች የፈተና መለማመጃ ሲስተም በደህና መጣችሁ!
        </h1>
        <p style="color:#ffd700; font-weight: bold; font-size: 1.2rem;">አዘጋጅ፦ በረከት ቀናው</p>
    </div>

    <div id="main-menu" class="container hidden">
        <h1>ዋና ማውጫ</h1>
        <button onclick="showScreen('role-page')">ጀምር / Start</button>
        <button onclick="startQRScanner()" style="background: #9b59b6;">ጥያቄ በ QR Scan ተቀበል</button>
    </div>

    <div id="qr-scan-page" class="container hidden">
        <h1>QR ኮዱን ስካን ያድርጉ</h1>
        <div id="qr-reader"></div>
        <button onclick="stopQRScanner()" style="background:#e74c3c">አቁም</button>
    </div>

    <div id="role-page" class="container hidden">
        <h1>ማን ነዎት?</h1>
        <button onclick="studentFlow()">ተማሪ (Student)</button>
        <button onclick="adminLoginFlow()">አድሚን (Admin)</button>
        <button onclick="showScreen('main-menu')" style="background:#636e72">ተመለስ</button>
    </div>

    <div id="stream-page" class="container hidden">
        <h1 id="stream-header">ዘርፍ ይምረጡ</h1>
        <button onclick="selectStream('Natural')">Natural Science</button>
        <button onclick="selectStream('Social')">Social Science</button>
        <button onclick="showScreen('role-page')" style="background:#636e72">ተመለስ</button>
    </div>

    <div id="subject-page" class="container hidden">
        <h1>ትምህርት ይምረጡ</h1>
        <div id="subject-list"></div>
        <button onclick="showScreen('stream-page')" style="background:#636e72">ተመለስ</button>
    </div>

    <div id="admin-upload-page" class="container hidden">
        <h1 id="admin-sub-title">ጥያቄ መጫኛ</h1>
        <input type="file" id="camera-input" accept="image/*" capture="environment" style="display:none" onchange="processImage(this)">
        <button onclick="document.getElementById('camera-input').click()" style="background:#e67e22">📷 ፎቶ አንሳ (OCR)</button>
        <textarea id="smart-paste-input" class="smart-paste-box" placeholder="ጽሑፉን እዚህ ይለጥፉ..."></textarea>
        <button onclick="autoExtractData()" style="background:#3498db">ዳታውን ለይ</button>
        <hr>
        <textarea id="admin-q-text" placeholder="ጥያቄው..."></textarea>
        <input id="admin-optA" placeholder="A"> <input id="admin-optB" placeholder="B">
        <input id="admin-optC" placeholder="C"> <input id="admin-optD" placeholder="D">
        <select id="admin-correct">
            <option value="">ትክክለኛ መልስ</option>
            <option value="A">A</option><option value="B">B</option><option value="C">C</option><option value="D">D</option>
        </select>
        <button onclick="saveAdminQuestion()" style="background:#27ae60">መዝግብ</button>
        <button onclick="generateSubjectQR()" style="background:#8e44ad">QR አውጣ</button>
        <div id="qrcode-container" class="hidden" style="background:white; color:black;">
            <div id="qrcode-output"></div>
            <button onclick="document.getElementById('qrcode-container').classList.add('hidden')">ዝጋ</button>
        </div>
        <button onclick="showScreen('subject-page')" style="background:#636e72">ተመለስ</button>
    </div>

    <div id="exam-page" class="container hidden">
        <div id="timer" style="font-size:2rem; color:#ff4b2b">60:00</div>
        <div id="q-text-display"></div>
        <div id="options-area"></div>
        <button id="next-btn" onclick="nextQuestion()">ቀጣይ</button>
        <button id="submit-btn" class="hidden" onclick="finishExam()">ጨርስ</button>
    </div>

    <div id="result-page" class="container hidden">
        <h1>ውጤት</h1>
        <h2 id="score-display"></h2>
        <button onclick="location.reload()">እንደገና</button>
    </div>

    <script>
        // --- 100% Offline Service Worker ---
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('data:text/javascript;base64,' + btoa(`
                self.addEventListener('install', e => e.waitUntil(caches.open('v1').then(c => c.addAll(['./']))));
                self.addEventListener('fetch', e => e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))));
            `));
        }

        // --- Install Prompt ---
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('install-btn').classList.remove('hidden');
        });

        document.getElementById('install-btn').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') document.getElementById('install-btn').classList.add('hidden');
                deferredPrompt = null;
            }
        });

        // --- Original Logic ---
        let db = JSON.parse(localStorage.getItem('mertuleDB')) || {"English":[], "Maths":[], "Physics":[], "Chemistry":[], "Biology":[], "Geography":[], "History":[], "Economics":[]};
        let isAdmin = false, activeSub = "", currentQs = [], qIdx = 0, score = 0, html5QrCode;

        setTimeout(() => showScreen('main-menu'), 3000);

        function showScreen(id) {
            document.querySelectorAll('.container').forEach(c => c.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        async function processImage(input) {
            if (input.files && input.files[0]) {
                const status = document.getElementById('smart-paste-input');
                status.value = "በማንበብ ላይ...";
                const result = await Tesseract.recognize(input.files[0], 'eng');
                status.value = result.data.text;
            }
        }

        function generateSubjectQR() {
            const data = JSON.stringify({s: activeSub, q: db[activeSub]});
            document.getElementById('qrcode-output').innerHTML = "";
            new QRCode(document.getElementById("qrcode-output"), {text: data, width: 200, height: 200});
            document.getElementById('qrcode-container').classList.remove('hidden');
        }

        function startQRScanner() {
            showScreen('qr-scan-page');
            html5QrCode = new Html5Qrcode("qr-reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
                let data = JSON.parse(text);
                if(data.s) { db[data.s] = data.q; localStorage.setItem('mertuleDB', JSON.stringify(db)); stopQRScanner(); }
            });
        }
        function stopQRScanner() { if(html5QrCode) html5QrCode.stop(); showScreen('main-menu'); }

        function adminLoginFlow() { if(prompt("Pass:") === "Mertule Mariyam@2026") { isAdmin = true; showScreen('stream-page'); } }
        function studentFlow() { isAdmin = false; showScreen('stream-page'); }

        function selectStream(stream) {
            showScreen('subject-page');
            const list = document.getElementById('subject-list'); list.innerHTML = "";
            let subs = stream === 'Natural' ? ["English","Maths","Physics","Chemistry","Biology"] : ["English","Maths","Geography","History","Economics"];
            subs.forEach(s => {
                let b = document.createElement('button'); b.innerText = s;
                b.onclick = () => { activeSub = s; if(isAdmin) showScreen('admin-upload-page'); else startExam(s); };
                list.appendChild(b);
            });
        }

        function autoExtractData() {
            let raw = document.getElementById('smart-paste-input').value;
            let p = raw.split(/\s[A-D][\)\.\s]/i);
            if(p.length >= 5) {
                document.getElementById('admin-q-text').value = p[0].trim();
                document.getElementById('admin-optA').value = p[1].trim();
                document.getElementById('admin-optB').value = p[2].trim();
                document.getElementById('admin-optC').value = p[3].trim();
                document.getElementById('admin-optD').value = p[4].trim();
            }
        }

        function saveAdminQuestion() {
            let q = {q:document.getElementById('admin-q-text').value, a:document.getElementById('admin-optA').value, b:document.getElementById('admin-optB').value, c:document.getElementById('admin-optC').value, d:document.getElementById('admin-optD').value, correct:document.getElementById('admin-correct').value};
            db[activeSub].push(q); localStorage.setItem('mertuleDB', JSON.stringify(db));
            alert("ተመዝግቧል!");
        }

        function startExam(s) {
            currentQs = db[s]; if(!currentQs.length) return alert("ጥያቄ የለም!");
            qIdx = 0; score = 0; showScreen('exam-page'); loadQ();
        }

        function loadQ() {
            let q = currentQs[qIdx];
            document.getElementById('q-text-display').innerText = (qIdx+1)+". "+q.q;
            const area = document.getElementById('options-area'); area.innerHTML = "";
            ['a','b','c','d'].forEach(o => {
                let b = document.createElement('button'); b.innerText = o.toUpperCase()+") "+q[o];
                b.onclick = () => { 
                    Array.from(area.children).forEach(btn => btn.style.background = "rgba(255,255,255,0.1)");
                    b.style.background = "#00d2ff"; b.dataset.ans = o.toUpperCase();
                };
                area.appendChild(b);
            });
            document.getElementById('next-btn').classList.toggle('hidden', qIdx === currentQs.length-1);
            document.getElementById('submit-btn').classList.toggle('hidden', qIdx !== currentQs.length-1);
        }

        function nextQuestion() {
            let sel = document.querySelector('[data-ans]');
            if(!sel) return alert("መልስ ይምረጡ");
            if(sel.dataset.ans === currentQs[qIdx].correct) score++;
            qIdx++; loadQ();
        }

        function finishExam() {
            let sel = document.querySelector('[data-ans]');
            if(sel && sel.dataset.ans === currentQs[qIdx].correct) score++;
            showScreen('result-page');
            document.getElementById('score-display').innerText = score+"/"+currentQs.length;
        }
    </script>
</body>
</html>
