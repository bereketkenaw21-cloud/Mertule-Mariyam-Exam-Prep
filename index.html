<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mertule Mariyam Exam Prep</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        /* 2026 Modern Design (Glassmorphism) */
        body {
            margin: 0; font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(45deg, #0f0c29, #302b63, #24243e);
            color: white; height: 100vh; display: flex; justify-content: center; align-items: center; text-align: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px);
            border-radius: 30px; padding: 25px; border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5); width: 85%; max-width: 500px;
            max-height: 90vh; overflow-y: auto;
        }
        .hidden { display: none !important; }
        h1 { font-size: 1.6rem; color: #00d2ff; }
        .creator { font-weight: bold; color: #ffd700; font-size: 1.1rem; margin-top: 10px; }
        .cap-icon { font-size: 70px; margin-bottom: 5px; }
        
        button {
            background: linear-gradient(to right, #00d2ff, #3a7bd5); color: white;
            border: none; padding: 12px 25px; border-radius: 50px; font-size: 1.1rem;
            cursor: pointer; margin: 10px; transition: 0.3s; width: 85%;
        }
        button:hover { transform: scale(1.05); box-shadow: 0 0 20px #00d2ff; }
        
        /* ሰፊ የምርጫ ሳጥኖች (Choice Boxes) */
        .options-list { display: flex; flex-direction: column; gap: 12px; width: 100%; margin: 15px 0; }
        .option-box {
            background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 16px; border-radius: 15px; text-align: left; font-size: 1.1rem;
            cursor: pointer; transition: 0.2s; display: flex; align-items: center;
        }
        .option-box:active, .option-box.selected {
            background: #00d2ff; color: #000; font-weight: bold; border-color: white;
        }
        .option-label {
            background: rgba(0, 0, 0, 0.3); padding: 4px 10px;
            border-radius: 8px; margin-right: 12px; font-weight: bold; color: #ffd700;
        }
        .option-box.selected .option-label { color: #000; }

        input, textarea {
            width: 85%; padding: 12px; margin: 10px; border-radius: 10px; border: none; outline: none;
            background: rgba(255, 255, 255, 0.2); color: white;
        }
        #timer { font-size: 1.5rem; color: #ff4b2b; font-weight: bold; margin-bottom: 15px; }
        .q-info { font-size: 0.9rem; color: #ffd700; margin-bottom: 5px; }
        .q-text { text-align: left; font-size: 1.2rem; margin-bottom: 15px; padding: 20px; background: rgba(0,0,0,0.3); border-radius: 20px; border-left: 5px solid #00d2ff; }
        .status-msg { color: #ffd700; font-size: 0.9rem; margin: 5px; }
        #install-box { background: #ffd700; color: #000; font-weight: bold; margin-bottom: 15px; display: none; }
        #reader { width: 100%; border-radius: 15px; overflow: hidden; background: white; }
        #qrcode { background: white; padding: 15px; display: inline-block; border-radius: 10px; margin-top: 10px; }
        .review-item { text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); padding: 10px; }
    </style>
</head>
<body>

    <div id="splash" class="container">
        <div class="cap-icon">🎓</div>
        <h1>እንኳን ወደ መርጡለ ማሪያም 2ኛ ደረጃ ትምህርት ቤት የተማሪዎች የፈተና መለማመጃ ሲስተም በደህና መጣችሁ!</h1>
        <p class="creator">አዘጋጅ፦ በረከት ቀናው</p>
    </div>

    <div id="main-menu" class="container hidden">
        <button id="install-box" onclick="installApp()">አፑን ስልክ ላይ ጫን (Install)</button>
        <h1>ምርጫዎን ያሳውቁ</h1>
        <button onclick="showRoleSelection()">Start / ጀምር</button>
        <button onclick="showScanPage()" style="background: #9b59b6;">ጥያቄ በ QR Scan ተቀበል</button>
    </div>

    <div id="scan-page" class="container hidden">
        <h1>QR ኮዱን ስካን ያድርጉ</h1>
        <div id="reader"></div>
        <button onclick="stopScanner(); showScreen('main-menu')" style="background: grey;">ተመለስ</button>
    </div>

    <div id="role-page" class="container hidden">
        <h1>ማን ነዎት?</h1>
        <button onclick="studentFlow()">ተማሪ (Student)</button>
        <button onclick="adminFlow()">አድሚን (Admin)</button>
        <br><button style="background: grey; width: 40%;" onclick="backToMenu()">ወደ ኋላ</button>
    </div>

    <div id="admin-login" class="container hidden">
        <h1>Admin Login</h1>
        <input type="password" id="admin-pass" placeholder="Password ያስገቡ...">
        <button onclick="checkAdminPass()">ግባ</button>
        <button style="background: grey; width: 40%;" onclick="backToRole()">ወደ ኋላ</button>
    </div>

    <div id="category-page" class="container hidden">
        <h1 id="category-title">ዘርፍ ይምረጡ</h1>
        <button onclick="showSubjects('Social')">Social Science</button>
        <button onclick="showSubjects('Natural')">Natural Science</button>
        <br><button style="background: grey; width: 40%;" onclick="backToRole()">ወደ ኋላ</button>
    </div>

    <div id="subject-page" class="container hidden">
        <h1 id="subject-title">ትምህርት ይምረጡ</h1>
        <div id="subject-list"></div>
        
        <div id="admin-upload-area" class="hidden">
            <p style="font-size: 0.8rem; color:#ffd700">አጻጻፍ: ጥያቄ # A # B # C # D | መልስ | ማብራሪያ</p>
            <textarea id="question-input" rows="5" placeholder="ጥያቄ እዚህ ይጻፉ..."></textarea>
            <div id="ocr-status" class="status-msg"></div>
            <button onclick="saveQuestions()" style="background: #28a745;">ጥያቄዎቹን ጫን</button>
            <button onclick="generateQR()" style="background: #9b59b6;">ለተማሪዎች አጋራ (QR)</button>
            <div id="qrcode" class="hidden"></div>
            <input type="file" id="camera-file" accept="image/*" capture="environment" class="hidden" onchange="handleOCR(this)">
            <button onclick="document.getElementById('camera-file').click()" style="background: #e67e22;">📷 በካሜራ አንሳ</button>
        </div>
        <button style="background: grey; width: 40%;" onclick="backToCategory()">ወደ ኋላ</button>
    </div>

    <div id="exam-page" class="container hidden">
        <div id="timer">60:00</div>
        <div id="q-info-box" class="q-info"></div>
        <div id="current-question-box" class="q-text"></div>
        
        <div class="options-list" id="options-container"></div>

        <div style="display: flex; justify-content: space-around;">
            <button id="prev-btn" onclick="goBack()" style="width: 45%; background: #e67e22;">ወደ ኋላ</button>
            <button onclick="nextQuestion()" style="width: 45%;">ቀጣይ</button>
        </div>
        <button id="submit-btn" onclick="finishExam()" class="hidden" style="background: #27ae60; margin-top: 15px;">ጨርስ (Submit)</button>
    </div>

    <div id="result-page" class="container hidden">
        <h1>ውጤትዎ</h1>
        <h2 id="final-score-display" style="font-size: 2.5rem; color:#00d2ff"></h2>
        <div id="review-area" style="max-height: 300px; overflow-y: auto;"></div>
        <button onclick="location.reload()">እንደገና ጀምር</button>
    </div>

    <script>
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

        let isAdmin = false, selectedSubject = "", currentQuestions = [], currentIndex = 0, timerSeconds = 3600, score = 0, studentAnswers = [], maxReachedIndex = 0;

        const screens = ['splash', 'main-menu', 'role-page', 'admin-login', 'category-page', 'subject-page', 'exam-page', 'scan-page', 'result-page'];
        function showScreen(id) { screens.forEach(s => document.getElementById(s).classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }
        setTimeout(() => showScreen('main-menu'), 4000);

        function showRoleSelection() { showScreen('role-page'); }
        function studentFlow() { isAdmin = false; showScreen('category-page'); }
        function adminFlow() { showScreen('admin-login'); }

        function checkAdminPass() {
            if(document.getElementById('admin-pass').value === "Mertule Mariyam@2026") { isAdmin = true; showScreen('category-page'); } 
            else { alert("የተሳሳተ ፓስወርድ ነው!"); }
        }

        function showSubjects(type) {
            showScreen('subject-page');
            const list = document.getElementById('subject-list');
            list.innerHTML = "";
            const common = ['English', 'Maths'], natural = ['Physics', 'Chemistry', 'Biology', 'Civics'], social = ['Geography', 'History', 'Economics'];
            let subs = (type === 'Natural') ? [...common, ...natural] : [...common, ...social];
            subs.forEach(s => {
                const btn = document.createElement('button'); btn.innerText = s;
                btn.onclick = () => selectSubject(s); list.appendChild(btn);
            });
        }

        function selectSubject(s) {
            selectedSubject = s;
            if(isAdmin) {
                document.getElementById('subject-list').classList.add('hidden');
                document.getElementById('admin-upload-area').classList.remove('hidden');
                document.getElementById('subject-title').innerText = s + " አድሚን";
                document.getElementById('question-input').value = localStorage.getItem('exam_' + selectedSubject) || "";
            } else { startExam(s); }
        }

        function saveQuestions() {
            localStorage.setItem('exam_' + selectedSubject, document.getElementById('question-input').value);
            alert("ተቀምጧል!");
        }

        function startExam(s) {
            const data = localStorage.getItem('exam_' + s);
            if(!data) return alert("ጥያቄ አልተጫነም!");
            currentQuestions = data.split('\n').filter(q => q.includes('|'));
            currentIndex = 0; maxReachedIndex = 0; studentAnswers = new Array(currentQuestions.length).fill("");
            showScreen('exam-page'); updateQuestion(); startTimer();
        }

        function updateQuestion() {
            document.getElementById('q-info-box').innerText = "ጥያቄ " + (currentIndex + 1) + " ከ " + currentQuestions.length;
            const parts = currentQuestions[currentIndex].split('|');
            const qAndOpts = parts[0].split('#'); // ጥያቄውን እና ምርጫውን በ # ይከፍላል
            
            document.getElementById('current-question-box').innerText = qAndOpts[0].trim();
            
            const container = document.getElementById('options-container');
            container.innerHTML = "";
            const labels = ['A', 'B', 'C', 'D'];

            for(let i=1; i<=4; i++) {
                const box = document.createElement('div');
                box.className = 'option-box';
                if(studentAnswers[currentIndex] === labels[i-1]) box.classList.add('selected');
                
                box.innerHTML = `<span class="option-label">${labels[i-1]}</span> <span>${qAndOpts[i] ? qAndOpts[i].trim() : "---"}</span>`;
                box.onclick = () => { studentAnswers[currentIndex] = labels[i-1]; updateQuestion(); };
                container.appendChild(box);
            }
            
            document.getElementById('prev-btn').style.visibility = (currentIndex > 0 && currentIndex > maxReachedIndex - 3) ? "visible" : "hidden";
            if(currentIndex === currentQuestions.length - 1) document.getElementById('submit-btn').classList.remove('hidden');
        }

        function nextQuestion() {
            if(!studentAnswers[currentIndex]) return alert("እባክዎ መጀመሪያ መልስ ይምረጡ!");
            if(currentIndex === maxReachedIndex) maxReachedIndex++;
            if(currentIndex < currentQuestions.length - 1) { currentIndex++; updateQuestion(); }
            else { finishExam(); }
        }

        function goBack() { if(currentIndex > 0 && currentIndex > maxReachedIndex - 3) { currentIndex--; updateQuestion(); } }

        function finishExam() {
            showScreen('result-page');
            score = 0;
            const area = document.getElementById('review-area'); area.innerHTML = "";
            currentQuestions.forEach((q, i) => {
                const p = q.split('|'), correct = p[1].trim().toUpperCase(), mine = studentAnswers[i];
                if(mine === correct) score++;
                area.innerHTML += `<div class="review-item"><p><b>Q${i+1}:</b> ${p[0].split('#')[0]}</p>
                    <p style="color:${mine==correct?'#2ecc71':'#e74c3c'}">መልስዎ: ${mine}</p>
                    <p style="color:#2ecc71">ትክክል: ${correct}</p>
                    <p style="color:#ffd700"><b>ማብራሪያ:</b> ${p[2] || "የለም"}</p></div>`;
            });
            document.getElementById('final-score-display').innerText = score + " / " + currentQuestions.length;
        }

        function startTimer() {
            setInterval(() => {
                if(timerSeconds > 0) {
                    timerSeconds--;
                    let min = Math.floor(timerSeconds / 60), sec = timerSeconds % 60;
                    document.getElementById('timer').innerText = `${min}:${sec < 10 ? '0'+sec : sec}`;
                }
            }, 1000);
        }

        function generateQR() {
            const data = localStorage.getItem('exam_' + selectedSubject);
            if(!data) return alert("ጥያቄ የለም!");
            const qrBox = document.getElementById('qrcode');
            qrBox.innerHTML = ""; qrBox.classList.remove('hidden');
            new QRCode(qrBox, { text: "SUB:"+selectedSubject+"#"+data, width: 180, height: 180 });
        }

        let html5QrCode;
        function showScanPage() {
            showScreen('scan-page');
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (decodedText) => {
                const parts = decodedText.split('#');
                const subName = parts[0].replace("SUB:", "");
                localStorage.setItem('exam_' + subName, parts[1]);
                alert(subName + " ጥያቄዎች ደርሰዋል!");
                stopScanner(); showScreen('main-menu');
            }).catch(()=>{});
        }
        function stopScanner() { if(html5QrCode) html5QrCode.stop(); }

        function handleOCR(input) {
            const file = input.files[0]; if (!file) return;
            document.getElementById('ocr-status').innerText = "እየተቀየረ ነው...";
            Tesseract.recognize(file, 'eng').then(({ data: { text } }) => {
                document.getElementById('question-input').value = text;
                document.getElementById('ocr-status').innerText = "ተጠናቋል!";
            });
        }

        function backToMenu() { showScreen('main-menu'); }
        function backToRole() { showScreen('role-page'); }
        function backToCategory() { showScreen('category-page'); }
    </script>
</body>
</html>
